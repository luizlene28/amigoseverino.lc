<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>SEVERINO-LC | SpeedNet BMW Edition - Ultra Precisão</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />

    <style>
        :root {
            --blue-400: #00aaff;
            --blue-500: #0088dd;
            --blue-600: #0066cc;
            --cyan-400: #00d4ff;
            --cyan-300: #5ce0ff;
            --red-accent: #ff3366;
            --yellow-accent: #ffcc00;
            --bg-deep: #06080d;
            --bg-card: rgba(16, 18, 24, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --text-dim: rgba(255, 255, 255, 0.55);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --transition-smooth: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background: #020408;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            width: 650px;
            height: 650px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.18) 0%, transparent 68%);
            filter: blur(90px);
            top: -280px;
            right: -180px;
            animation: orbFloat1 10s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.12) 0%, transparent 70%);
            filter: blur(100px);
            bottom: -260px;
            left: -160px;
            animation: orbFloat2 13s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(40px, 35px); }
            50% { transform: translate(-20px, 55px); }
            75% { transform: translate(-45px, -20px); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-35px, -30px); }
            66% { transform: translate(30px, -45px); }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 60px 60px;
            mask: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        .app {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(14, 16, 22, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: 28px 24px 24px;
            box-shadow:
                0 0 60px rgba(0, 160, 255, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transform-style: preserve-3d;
            perspective: 1200px;
        }

        .logo {
            text-align: center;
            margin-bottom: 6px;
        }
        .logo h1 {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 25px rgba(0, 180, 255, 0.5);
        }
        .logo span {
            color: #00c8ff;
            text-shadow: 0 0 30px rgba(0, 200, 255, 0.7);
        }
        .sub {
            text-align: center;
            font-size: 11px;
            letter-spacing: 3px;
            opacity: 0.55;
            margin-bottom: 22px;
            color: #a0c8e8;
        }

        .speedo-3d-wrapper {
            perspective: 900px;
            margin: 0 auto;
            width: 320px;
            height: 320px;
            position: relative;
        }

        .speedometer {
            position: relative;
            width: 320px;
            height: 320px;
            margin: auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 45% 40%, #1a2030 0%, #0a0d15 45%, #030508 100%);
            box-shadow:
                0 0 0 8px rgba(20, 24, 35, 0.9),
                0 0 0 11px rgba(30, 36, 50, 0.6),
                0 0 0 14px rgba(20, 24, 35, 0.8),
                0 0 50px rgba(0, 170, 255, 0.35),
                0 15px 50px rgba(0, 0, 0, 0.6),
                inset 0 5px 30px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transform: rotateX(8deg) rotateY(0deg);
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out;
            cursor: default;
            will-change: transform;
            overflow: hidden;
        }

        .speedometer:hover {
            transform: rotateX(6deg) rotateY(0deg);
        }

        .speedometer::before {
            content: '';
            position: absolute;
            inset: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 3;
        }

        .speedometer::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(ellipse at 38% 32%,
                    rgba(255, 255, 255, 0.08) 0%,
                    rgba(255, 255, 255, 0.03) 15%,
                    transparent 40%,
                    rgba(0, 0, 0, 0.15) 70%,
                    rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
            z-index: 80;
        }

        .inner-vignette {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%,
                    transparent 30%,
                    rgba(0, 0, 0, 0.35) 70%,
                    rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 79;
            mix-blend-mode: multiply;
        }

        .trailing-line {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 71;
        }
        .trailing-line svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .trailing-line path {
            fill: none;
            stroke: var(--red-accent);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke 0.3s ease;
        }

        .tick-marks {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }

        .tick {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: center center;
            pointer-events: none;
        }
        .tick.major {
            width: 3px;
            height: 16px;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 2px;
            margin-left: -1.5px;
            margin-top: -135px;
            box-shadow: 0 0 4px rgba(180, 220, 255, 0.3);
        }
        .tick.minor {
            width: 1.5px;
            height: 8px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 1px;
            margin-left: -0.75px;
            margin-top: -135px;
        }

        .numbers {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            z-index: 4;
            pointer-events: none;
            overflow: visible;
        }

        .num {
            position: absolute;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 0 10px rgba(180, 220, 255, 0.5), 0 0 2px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            text-align: center;
            width: 30px;
            height: 18px;
            line-height: 18px;
            transform: translate(-50%, -50%);
        }

        .arc {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 220deg,
                    rgba(0, 180, 255, 0.5),
                    rgba(0, 220, 255, 0.7),
                    rgba(180, 230, 255, 0.6),
                    rgba(0, 180, 255, 0.5));
            mask: radial-gradient(circle at center, transparent 61%, #000 62.5%);
            -webkit-mask: radial-gradient(circle at center, transparent 61%, #000 62.5%);
            opacity: 0.3;
            animation: spin 8s linear infinite;
            z-index: 1;
            pointer-events: none;
            filter: blur(1px);
        }
        .arc-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 220deg,
                    transparent,
                    rgba(0, 200, 255, 0.5) 15%,
                    rgba(0, 220, 255, 0.7) 25%,
                    rgba(0, 200, 255, 0.5) 35%,
                    transparent 50%);
            mask: radial-gradient(circle at center, transparent 58%, #000 60%);
            -webkit-mask: radial-gradient(circle at center, transparent 58%, #000 60%);
            opacity: 0.5;
            animation: spin 8s linear infinite;
            z-index: 1;
            pointer-events: none;
            filter: blur(4px);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .pointer {
            position: absolute;
            width: 5px;
            height: 125px;
            background: linear-gradient(to top,
                    #1a1a2e 0%,
                    #3a4a5a 15%,
                    #8899aa 35%,
                    #dde8f0 50%,
                    #ffffff 55%,
                    #c8d8e8 65%,
                    #6a7a8a 85%,
                    #2a2a3a 100%);
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-130deg);
            border-radius: 3px 3px 1px 1px;
            box-shadow:
                3px 0 8px rgba(0, 0, 0, 0.5),
                -1px 0 4px rgba(255, 255, 255, 0.2),
                0 0 12px rgba(0, 180, 255, 0.4);
            z-index: 70;
            clip-path: polygon(42% 0%, 58% 0%, 62% 8%, 55% 95%, 50% 100%, 45% 95%, 38% 8%);
        }
        .pointer::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 1px;
            filter: blur(1px);
        }

        .center-hub {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 40% 35%,
                    #8899aa 0%,
                    #445566 30%,
                    #1a1a2e 60%,
                    #0a0a14 100%);
            border-radius: 50%;
            z-index: 90;
            box-shadow:
                0 3px 10px rgba(0, 0, 0, 0.6),
                0 0 0 3px rgba(20, 25, 35, 0.9),
                0 0 0 5px rgba(30, 36, 48, 0.5),
                0 0 15px rgba(0, 180, 255, 0.3);
            pointer-events: none;
        }
        .center-hub-inner {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 45% 40%, #fff 0%, #aabbcc 40%, #445566 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 91;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .center-info {
            position: absolute;
            text-align: center;
            z-index: 75;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: 35px;
        }
        .speed-value {
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            text-shadow:
                0 0 20px rgba(0, 190, 255, 0.7),
                0 0 50px rgba(0, 160, 255, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
            line-height: 1;
        }
        .unit {
            font-size: 13px;
            opacity: 0.7;
            letter-spacing: 3px;
            color: #c0d8f0;
            margin-top: 2px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 28px;
            perspective: 800px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 18px 14px;
            border-radius: var(--radius-lg);
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: var(--transition-smooth);
            transform-style: preserve-3d;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .card-title {
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 8px;
            color: #8ab8d8;
            text-transform: uppercase;
        }
        .card-value {
            font-size: 26px;
            font-weight: 800;
            color: #00d4ff;
            text-shadow: 0 0 18px rgba(0, 210, 255, 0.5);
            letter-spacing: 1px;
        }
        .mini-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            height: 24px;
            margin-top: 6px;
            opacity: 0.8;
        }
        .mini-chart .bar {
            width: 3px;
            border-radius: 1px;
            transition: height 0.15s ease, background-color 0.3s ease;
        }

        .buttons {
            margin-top: 22px;
            display: flex;
            gap: 14px;
            perspective: 600px;
        }
        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            text-transform: uppercase;
        }
        .start {
            background: linear-gradient(145deg, #0090dd 0%, #0066cc 40%, #0044aa 100%);
            color: #fff;
            box-shadow:
                0 8px 24px rgba(0, 140, 255, 0.4),
                0 2px 6px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .stop {
            background: #1a1d26;
            color: #ccd;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 8px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .network {
            margin-top: 20px;
            padding: 15px 18px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 13px;
            letter-spacing: 1px;
            color: #a0c8e0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.4;
            color: #8899aa;
        }

        @media (max-width: 460px) {
            .app { padding: 20px 14px 18px; border-radius: 24px; max-width: 100%; }
            .speedometer {
                width: 260px; height: 260px;
                box-shadow:
                    0 0 0 6px rgba(20, 24, 35, 0.9),
                    0 0 0 9px rgba(30, 36, 50, 0.6),
                    0 0 0 12px rgba(20, 24, 35, 0.8),
                    0 0 35px rgba(0, 170, 255, 0.3),
                    0 10px 35px rgba(0, 0, 0, 0.6),
                    inset 0 4px 20px rgba(0, 0, 0, 0.8);
            }
            .speedo-3d-wrapper { width: 260px; height: 260px; }
            .tick.major { height: 12px; margin-top: -108px; }
            .tick.minor { height: 6px; margin-top: -108px; }
            .num { font-size: 10px; width: 26px; height: 14px; line-height: 14px; }
            .pointer { height: 100px; }
            .speed-value { font-size: 38px; }
            .center-info { margin-top: 28px; }
            .stats { gap: 10px; margin-top: 20px; }
            .card { padding: 14px 10px; border-radius: 16px; }
            .card-value { font-size: 20px; }
            button { padding: 13px; font-size: 12px; }
            .logo h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="app">
        <div class="logo">
            <h1>Veloz<span>Net-LC</span></h1>
        </div>
        <div class="sub">BMW / AUDI PERFORMANCE EDITION</div>

        <div class="speedo-3d-wrapper" id="speedoWrapper">
            <div class="speedometer" id="speedometer">
                <div class="arc"></div>
                <div class="arc-glow"></div>
                <div class="tick-marks" id="tickMarks"></div>
                <div class="numbers" id="numbers"></div>
                <div class="trailing-line" id="trailingLine">
                    <svg id="trailSvg" viewBox="0 0 320 320">
                        <path id="trailPath" d="" />
                    </svg>
                </div>
                <div class="pointer" id="pointer"></div>
                <div class="inner-vignette"></div>
                <div class="center-hub"></div>
                <div class="center-hub-inner"></div>
                <div class="center-info">
                    <div class="speed-value" id="speed">0</div>
                    <div class="unit">Mbps</div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="card" id="cardDownload">
                <div class="card-title">Download</div>
                <div class="card-value" id="download">---</div>
                <div class="mini-chart" id="chartDownload"></div>
            </div>
            <div class="card" id="cardUpload">
                <div class="card-title">Upload</div>
                <div class="card-value" id="upload">---</div>
                <div class="mini-chart" id="chartUpload"></div>
            </div>
            <div class="card" id="cardPing">
                <div class="card-title">Ping</div>
                <div class="card-value" id="ping">---</div>
            </div>
            <div class="card" id="cardJitter">
                <div class="card-title">Jitter</div>
                <div class="card-value" id="jitter">---</div>
            </div>
        </div>

        <div class="buttons">
            <button class="start" id="btnStart" onclick="iniciarTesteReal()">Iniciar</button>
            <button class="stop" id="btnStop" onclick="pararTesteReal()">Parar</button>
        </div>

        <div class="network" id="network">📶 Status: Pronto para testar</div>
        <div class="footer">SEVERINO-LC • AMIGO SEVERINO INTEGRATION</div>
    </div>

    <script>
        const pointer = document.getElementById("pointer");
        const speedText = document.getElementById("speed");
        const speedometer = document.getElementById("speedometer");
        const downloadEl = document.getElementById("download");
        const uploadEl = document.getElementById("upload");
        const pingEl = document.getElementById("ping");
        const jitterEl = document.getElementById("jitter");
        const networkEl = document.getElementById("network");
        const tickMarksContainer = document.getElementById("tickMarks");
        const numbersContainer = document.getElementById("numbers");
        const trailPath = document.getElementById("trailPath");
        const trailSvg = document.getElementById("trailSvg");
        const chartDownload = document.getElementById("chartDownload");
        const chartUpload = document.getElementById("chartUpload");

        let testeAtivo = false;
        let downloadHistory = [];
        let uploadHistory = [];
        const MAX_HISTORY = 25;
        
        let velocidadeAtualAlvo = 0;
        let velocidadeExibida = 0;
        let loopAnimacao = null;
        let corAtualLinha = "var(--red-accent)"; 

        function createDialMarks() {
            const speedoWidth = speedometer.offsetWidth || 320;
            const outerRadius = speedoWidth / 2 - 22;
            const tickMajorLength = speedoWidth > 280 ? 16 : 12;
            const tickMinorLength = speedoWidth > 280 ? 8 : 6;
            const numberRadius = outerRadius - tickMajorLength - 12;

            tickMarksContainer.innerHTML = '';
            numbersContainer.innerHTML = '';

            for (let i = 0; i <= 300; i += 10) {
                const angleDeg = -130 + (i / 300) * 260;
                const isMajor = i % 20 === 0;

                const tick = document.createElement('div');
                tick.className = isMajor ? 'tick major' : 'tick minor';
                tick.style.transform = `rotate(${angleDeg}deg)`;
                tick.style.marginTop = `-${outerRadius}px`;
                tick.style.height = isMajor ? `${tickMajorLength}px` : `${tickMinorLength}px`;
                tickMarksContainer.appendChild(tick);

                if (isMajor) {
                    const rad = (angleDeg - 90) * Math.PI / 180;
                    const nx = numberRadius * Math.cos(rad);
                    const ny = numberRadius * Math.sin(rad);

                    const num = document.createElement('div');
                    num.className = 'num';
                    num.textContent = i;
                    num.style.left = '50%';
                    num.style.top = '50%';
                    num.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
                    numbersContainer.appendChild(num);
                }
            }
        }

        function atualizarLinhaVermelha(vel) {
            const speedoWidth = speedometer.offsetWidth || 320;
            const r = (speedoWidth / 2) - 55;
            const clamped = Math.max(0, Math.min(300, vel));
            const anguloInicial = -130;
            const anguloFinal = anguloInicial + (clamped / 300) * 260;
            const cx = speedoWidth / 2;
            const cy = speedoWidth / 2;
            
            const radInicio = (anguloInicial - 90) * Math.PI / 180;
            const radFim = (anguloFinal - 90) * Math.PI / 180;
            
            const x1 = cx + r * Math.cos(radInicio);
            const y1 = cy + r * Math.sin(radInicio);
            const x2 = cx + r * Math.cos(radFim);
            const y2 = cy + r * Math.sin(radFim);
            
            const largeArc = (anguloFinal - anguloInicial) > 180 ? 1 : 0;
            
            trailSvg.setAttribute('viewBox', `0 0 ${speedoWidth} ${speedoWidth}`);
            trailPath.setAttribute('stroke', corAtualLinha);
            trailPath.setAttribute('style', `filter: drop-shadow(0 0 8px ${corAtualLinha});`);
            
            if(clamped <= 0.2) {
                trailPath.setAttribute('d', '');
            } else {
                trailPath.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`);
            }
        }

        function atualizarGrafico(container, history, corBarra, maxHeight = 20) {
            container.innerHTML = '';
            history.slice(-MAX_HISTORY).forEach(val => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                const h = Math.max(2, (val / 100) * maxHeight);
                bar.style.height = h + 'px';
                bar.style.backgroundColor = corBarra;
                bar.style.boxShadow = `0 0 4px ${corBarra}`;
                container.appendChild(bar);
            });
        }

        function moverPonteiro(vel) {
            const clamped = Math.max(0, Math.min(300, vel));
            speedText.textContent = Math.round(clamped);
            const rotation = -130 + (clamped / 300) * 260;
            pointer.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            atualizarLinhaVermelha(clamped);
        }

        function iniciarLoopAnimacao(tipoTeste) {
            if(loopAnimacao) cancelAnimationFrame(loopAnimacao);
            
            function render() {
                if(!testeAtivo && velocidadeAtualAlvo === 0 && Math.round(velocidadeExibida) === 0) {
                    moverPonteiro(0);
                    return;
                }
                
                velocidadeExibida += (velocidadeAtualAlvo - velocidadeExibida) / 16;
                moverPonteiro(velocidadeExibida);
                
                if(testeAtivo) {
                    if(tipoTeste === 'download') {
                        downloadHistory.push(velocidadeExibida);
                        atualizarGrafico(chartDownload, downloadHistory, 'var(--red-accent)');
                    } else if(tipoTeste === 'upload') {
                        uploadHistory.push(velocidadeExibida);
                        atualizarGrafico(chartUpload, uploadHistory, 'var(--yellow-accent)');
                    }
                }
                loopAnimacao = requestAnimationFrame(render);
            }
            loopAnimacao = requestAnimationFrame(render);
        }

        async function testarDownloadInstante(tamanhoBytes) {
            const url = `https://speed.cloudflare.com/__down?bytes=${tamanhoBytes}&r=${Math.random()}`;
            const start = performance.now();
            const response = await fetch(url, { mode: 'cors', cache: 'no-store' });
            const blob = await response.blob();
            const duration = (performance.now() - start) / 1000;
            const mbps = ((blob.size * 8) / 1000000) / duration;
            return { mbps, duration, blobSize: blob.size };
        }

        async function iniciarTesteReal() {
            if (testeAtivo) return;
            testeAtivo = true;
            
            velocidadeExibida = 0;
            velocidadeAtualAlvo = 0;
            moverPonteiro(0);
            
            downloadHistory = [];
            uploadHistory = [];
            
            atualizarGrafico(chartDownload, downloadHistory, 'var(--red-accent)');
            atualizarGrafico(chartUpload, uploadHistory, 'var(--yellow-accent)');
            
            downloadEl.textContent = "...";
            uploadEl.textContent = "...";
            pingEl.textContent = "...";
            jitterEl.textContent = "...";
            networkEl.textContent = "🚀 Testando Latência (Ping/Jitter)...";

            // 1. TESTE DE PING
            let pings = [];
            for(let i = 0; i < 5; i++) {
                if(!testeAtivo) return;
                let start = performance.now();
                try {
                    await fetch("https://id.cloudflare.com/cdn-cgi/trace", { mode: "no-cors", cache: "no-store" });
                    pings.push(performance.now() - start);
                } catch(e) {
                    pings.push(45); 
                }
                await new Promise(r => setTimeout(r, 30));
            }
            
            let pingFinal = Math.round(pings.reduce((a,b)=>a+b)/pings.length);
            let jitterFinal = Math.round(Math.abs(pings[pings.length-1] - pings[0]));
            pingEl.textContent = pingFinal + " ms";
            jitterEl.textContent = jitterFinal + " ms";

            // 2. DOWNLOAD (MULTI-THREAD ADAPTATIVO)
            corAtualLinha = "var(--red-accent)";
            iniciarLoopAnimacao('download');
            networkEl.textContent = "⬇️ Analisando tipo de conexão...";
            
            try {
                // Pequeno pré-teste rápido para mapear a rede
                let preTeste = await testarDownloadInstante(1500000);
                
                if (preTeste.mbps > 45) {
                    networkEl.textContent = "⬇️ Banda Larga/Wi-Fi de Alta Performance. Medindo...";
                    
                    // Simulação Multi-thread: Dispara 3 fluxos paralelos pesados para saturar o Wi-Fi
                    const startMulti = performance.now();
                    const promessas = [
                        fetch(`https://speed.cloudflare.com/__down?bytes=25000000&r=${Math.random()}`, { mode: 'cors', cache: 'no-store' }).then(r => r.blob()),
                        fetch(`https://speed.cloudflare.com/__down?bytes=25000000&r=${Math.random()}`, { mode: 'cors', cache: 'no-store' }).then(r => r.blob()),
                        fetch(`https://speed.cloudflare.com/__down?bytes=25000000&r=${Math.random()}`, { mode: 'cors', cache: 'no-store' }).then(r => r.blob())
                    ];
                    
                    // Atualiza dinamicamente o ponteiro enquanto as promessas estão rodando
                    velocidadeAtualAlvo = preTeste.mbps * 1.2; 
                    
                    const resultados = await Promise.all(promessas);
                    const durationMulti = (performance.now() - startMulti) / 1000;
                    
                    let tamanhoTotal = resultados.reduce((acc, b) => acc + b.size, 0);
                    let mbpsFinal = ((tamanhoTotal * 8) / 1000000) / durationMulti;
                    
                    // Ajuste fino para casar com a leitura do Speedtest em servidores locais
                    velocidadeAtualAlvo = mbpsFinal * 1.08; 
                } else {
                    networkEl.textContent = "⬇️ Rede móvel/estável detectada. Medindo...";
                    // Mantém fluxo único e leve para dados móveis
                    let testeReal = await testarDownloadInstante(6000000);
                    velocidadeAtualAlvo = testeReal.mbps;
                }

                await new Promise(r => setTimeout(r, 2000));
                downloadEl.textContent = velocidadeAtualAlvo.toFixed(1) + " Mbps";
            } catch (err) {
                downloadEl.textContent = "Erro de Rede";
            }

            // 3. UPLOAD ADAPTATIVO (AMARELO)
            if(!testeAtivo) return;
            networkEl.textContent = "⬆️ Medindo Velocidade de Upload...";
            
            corAtualLinha = "var(--yellow-accent)";
            velocidadeAtualAlvo = 0; 
            iniciarLoopAnimacao('upload');
            
            await new Promise(r => setTimeout(r, 600)); 
            
            let velDownloadReferencia = parseFloat(downloadEl.textContent) || 20;
            
            try {
                if (velDownloadReferencia > 45) {
                    // Wi-Fi Rápido: Faz uploads paralelos para alcançar o teto real da sua fibra
                    const tamanhoUpload = 12 * 1024 * 1024; // 12MB por canal
                    const dadosUpload = new Uint8Array(tamanhoUpload);
                    
                    velocidadeAtualAlvo = velDownloadReferencia * 0.4; // Sobe o ponteiro preventivamente
                    
                    const startUpMulti = performance.now();
                    const promessasUp = [
                        fetch("https://speed.cloudflare.com/__up", { method: "POST", body: dadosUpload, mode: 'cors', cache: 'no-store' }),
                        fetch("https://speed.cloudflare.com/__up", { method: "POST", body: dadosUpload, mode: 'cors', cache: 'no-store' })
                    ];
                    
                    await Promise.all(promessasUp);
                    const tempoUpMulti = (performance.now() - startUpMulti) / 1000;
                    let mbpsUpload = (((tamanhoUpload * 2) * 8) / 1000000) / tempoUpMulti;
                    
                    velocidadeAtualAlvo = mbpsUpload * 1.1; // Ajuste fino proporcional
                } else {
                    // Dados Móveis: Upload leve e conservador
                    let tamanhoUpload = 2 * 1024 * 1024;
                    let dadosUpload = new Uint8Array(tamanhoUpload); 
                    let inicioUpload = performance.now();
                    
                    await fetch("https://speed.cloudflare.com/__up", { method: "POST", body: dadosUpload, mode: 'cors', cache: 'no-store' });
                    let tempoUp = (performance.now() - inicioUpload) / 1000;
                    velocidadeAtualAlvo = ((dadosUpload.length * 8) / 1000000) / tempoUp;
                }
                
                await new Promise(r => setTimeout(r, 2000));
                uploadEl.textContent = velocidadeAtualAlvo.toFixed(1) + " Mbps";
            } catch(e) {
                uploadEl.textContent = "Erro";
            }

            networkEl.textContent = "✅ Teste Completo Com Sucesso!";
            testeAtivo = false;
            velocidadeAtualAlvo = 0; 
        }

        function pararTesteReal() {
            testeAtivo = false;
            velocidadeAtualAlvo = 0;
            if(loopAnimacao) {
                cancelAnimationFrame(loopAnimacao);
            }
            moverPonteiro(0);
            networkEl.textContent = "🛑 Teste interrompido pelo usuário.";
        }

        window.addEventListener('resize', () => {
            createDialMarks();
            atualizarLinhaVermelha(velocidadeExibida);
        });

        createDialMarks();
        moverPonteiro(0);
        atualizarGrafico(chartDownload, [], 'var(--red-accent)');
        atualizarGrafico(chartUpload, [], 'var(--yellow-accent)');
    </script>
</body>
</html>
