<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Severino Store • Calendário 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', Tahoma, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0d0d1a 50%, #020207 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255, 215, 0, 0.5), transparent),
        radial-gradient(1px 1px at 25% 60%, rgba(255, 215, 0, 0.4), transparent),
        radial-gradient(1px 1px at 40% 10%, rgba(255, 215, 0, 0.3), transparent),
        radial-gradient(1px 1px at 60% 80%, rgba(255, 215, 0, 0.5), transparent),
        radial-gradient(1px 1px at 75% 30%, rgba(255, 215, 0, 0.4), transparent),
        radial-gradient(1px 1px at 90% 70%, rgba(255, 215, 0, 0.3), transparent),
        radial-gradient(1px 1px at 15% 85%, rgba(255, 215, 0, 0.4), transparent),
        radial-gradient(1px 1px at 50% 50%, rgba(255, 215, 0, 0.2), transparent),
        radial-gradient(1px 1px at 80% 15%, rgba(255, 215, 0, 0.5), transparent),
        radial-gradient(1px 1px at 35% 40%, rgba(255, 215, 0, 0.3), transparent);
      background-size: 200% 200%;
      pointer-events: none;
      z-index: 0;
      animation: twinkle 6s infinite alternate ease-in-out;
    }

    @keyframes twinkle {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      perspective: 1200px;
      position: relative;
      z-index: 1;
    }

    .cube-wrapper {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 80px;
      height: 80px;
      perspective: 600px;
      cursor: grab;
      z-index: 100;
      transition: transform 0.1s;
    }

    .cube-wrapper:active {
      cursor: grabbing;
    }

    .cube {
      width: 80px;
      height: 80px;
      position: relative;
      transform-style: preserve-3d;
      animation: floatCubeSmall 5s infinite ease-in-out, spinCubeSmall 12s infinite linear;
      transition: transform 0.15s ease-out;
    }

    @keyframes floatCubeSmall {
      0%, 100% { transform: translateY(0) rotateX(-8deg) rotateY(0deg); }
      25% { transform: translateY(-6px) rotateX(-5deg) rotateY(90deg); }
      50% { transform: translateY(0) rotateX(-10deg) rotateY(180deg); }
      75% { transform: translateY(4px) rotateX(-5deg) rotateY(270deg); }
    }

    @keyframes spinCubeSmall {
      0% { transform: rotateX(-8deg) rotateY(0deg); }
      100% { transform: rotateX(-8deg) rotateY(360deg); }
    }

    .cube-wrapper:hover .cube {
      animation-play-state: paused;
    }

    .face {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      backface-visibility: hidden;
      border: 1.5px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.25), inset 0 0 10px rgba(255, 255, 255, 0.08);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      background: linear-gradient(145deg, rgba(30, 10, 60, 0.95), rgba(15, 5, 30, 0.98));
      backdrop-filter: blur(4px);
      font-size: 0.7rem;
    }

    .faceFront { transform: translateZ(40px); background: radial-gradient(circle at 30% 30%, #3d1e6d, #1a0a2e); }
    .faceFront .store-icon { font-size: 1.3rem; margin-bottom: 1px; filter: drop-shadow(0 0 6px gold); }
    .faceFront .store-name { font-size: 0.55rem; letter-spacing: 1.5px; color: #ffd700; }

    .faceBack { transform: rotateY(180deg) translateZ(40px); background: radial-gradient(circle at 70% 40%, #2d1b4e, #140a24); font-size: 0.8rem; letter-spacing: 2px; color: #ffd966; }
    .faceRight { transform: rotateY(90deg) translateZ(40px); background: radial-gradient(circle at 50% 50%, #3b206b, #1e0c38); font-size: 0.7rem; color: #f0c27b; }
    .faceLeft { transform: rotateY(-90deg) translateZ(40px); background: radial-gradient(circle at 50% 50%, #2c1a54, #150a2b); font-size: 0.9rem; font-weight: 900; color: #ffd700; }
    .faceTop { transform: rotateX(90deg) translateZ(40px); background: radial-gradient(circle at 50% 40%, #4a2575, #1e0c38); font-size: 1.5rem; }
    .faceBottom { transform: rotateX(-90deg) translateZ(40px); background: radial-gradient(circle at 50% 50%, #2d1b4e, #140a24); font-size: 1.1rem; letter-spacing: 2px; color: #ffd966; }

    #headerMain {
      width: 100%;
      padding: 20px 18px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(30, 60, 114, 0.85), rgba(42, 82, 152, 0.85));
      background-position: center;
      background-size: cover;
      text-align: center;
      box-shadow:
        0 20px 40px rgba(0, 40, 100, 0.25),
        0 10px 20px rgba(0, 0, 0, 0.5),
        inset 0 -3px 6px rgba(0, 0, 0, 0.2);
      transform: rotateX(3deg) translateZ(15px);
      transform-style: preserve-3d;
      border: 2px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    #clock {
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
      margin-bottom: 4px;
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 20px;
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(8px);
      color: #fff;
    }

    #titleApp {
      font-size: 1.5rem;
      font-weight: 900;
      text-shadow: 0 3px 6px rgba(0, 0, 0, 0.6);
      letter-spacing: 2px;
      margin: 4px 0;
      color: #e0f0ff;
    }

    #yearBadge {
      font-size: 1rem;
      opacity: 0.95;
      background: rgba(0, 0, 0, 0.35);
      padding: 5px 16px;
      border-radius: 20px;
      display: inline-block;
      backdrop-filter: blur(8px);
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffd700;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      background: linear-gradient(145deg, rgba(20, 10, 40, 0.8), rgba(10, 5, 20, 0.9));
      padding: 15px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 215, 0, 0.25);
    }

    .year-selector {
      grid-column: span 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 12px;
      border-radius: 15px;
    }

    #yearVal {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: #ffd700;
    }

    button {
      padding: 13px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      background: linear-gradient(145deg, #2d2d3d, #1a1a2a);
      color: #ffd966;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 1rem;
    }

    button:hover {
      background: linear-gradient(145deg, #3d3d55, #2a2a3a);
      border-color: rgba(255, 215, 0, 0.6);
      color: #fff;
    }

    .btn-action {
      background: linear-gradient(145deg, #2a5298, #1e3c72);
      color: #fff;
      font-weight: 800;
      border-color: rgba(255, 215, 0, 0.5);
    }

    .month-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 10px 6px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .month-nav button {
      background: linear-gradient(145deg, #2a5298, #1e3c72);
      font-size: 2rem;
      width: 55px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #fff;
    }

    #monthLabel {
      font-size: 1.7rem;
      font-weight: 900;
      color: #ffd700;
      letter-spacing: 3px;
    }

    .card {
      background: linear-gradient(145deg, rgba(18, 10, 35, 0.85), rgba(8, 4, 18, 0.9));
      border-radius: 28px;
      padding: 18px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: 800;
      color: #ffd966;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day {
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, rgba(30, 20, 55, 0.9), rgba(15, 8, 30, 0.95));
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      border: 1px solid rgba(255, 215, 0, 0.2);
      position: relative;
      cursor: pointer;
      color: #e0d0f0;
    }

    .day.empty {
      background: transparent;
      border: none;
      box-shadow: none;
      pointer-events: none;
    }

    .day.today {
      border: 2.5px solid #ffd700;
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.3), rgba(255, 180, 0, 0.15));
      font-weight: 900;
      color: #fff;
    }

    .day.holiday {
      background: linear-gradient(145deg, #c0392b, #e74c3c);
      color: #fff;
    }

    .holiday-name {
      font-size: 0.55rem;
      position: absolute;
      bottom: 3px;
      text-align: center;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #ffeaa7;
    }

    .note-dot {
      width: 7px;
      height: 7px;
      background: #ffd700;
      border-radius: 50%;
      margin-top: 3px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      padding: 20px;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {
      background: linear-gradient(145deg, #1f1035, #140a24);
      padding: 28px;
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      border: 2px solid rgba(255, 215, 0, 0.3);
    }

    textarea {
      width: 100%;
      height: 120px;
      margin: 12px 0;
      border-radius: 16px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #fff;
    }

    @media (max-width: 380px) {
      .cube-wrapper { width: 60px; height: 60px; }
      .cube { width: 60px; height: 60px; }
      .face { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>

  <div class="cube-wrapper" id="cubeWrapper">
    <div class="cube" id="mainCube">
      <div class="face faceFront">
        <span class="store-icon">🏪</span>
        <span class="store-name">SEVERINO</span>
      </div>
      <div class="face faceBack" id="cubeClock">00:00</div>
      <div class="face faceRight" id="cubeMonth">Abril</div>
      <div class="face faceLeft" id="cubeYear">2026</div>
      <div class="face faceTop">📅</div>
      <div class="face faceBottom">3D</div>
    </div>
  </div>

  <div class="container">
    <header id="headerMain">
      <div id="clock">00:00:00</div>
      <h2 id="titleApp">Severino Store</h2>
      <div id="yearBadge">2026</div>
    </header>

    <div class="controls">
      <div class="year-selector">
        <button onclick="changeYear(-1)">◀</button>
        <span id="yearVal">2026</span>
        <button onclick="changeYear(1)">▶</button>
      </div>
      <button class="btn-action" onclick="document.getElementById('imgIn').click()">🖼️ Imagem</button>
      <button class="btn-action" onclick="resetBg()">↺ Padrão</button>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="monthLabel">Abril</span>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="card">
      <div class="weekdays">
        <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h4 id="mTitle">📝 Lembrete</h4>
      <textarea id="mInput" placeholder="Digite seu lembrete..."></textarea>
      <div style="display:flex; gap:12px; margin-top:5px;">
        <button style="flex:1; background:linear-gradient(145deg, #27ae60, #2ecc71); color:#fff; font-weight:800;" onclick="saveNote()">💾 Salvar</button>
        <button style="flex:1;" onclick="closeModal()">❌ Sair</button>
      </div>
    </div>
  </div>

  <input type="file" id="imgIn" hidden accept="image/*">

  <script>
    (function() {
      const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
      const holidays = {
        "1-1":"Ano Novo","4-21":"Tiradentes","5-1":"Trabalho","9-7":"Independência",
        "10-12":"Aparecida","11-2":"Finados","11-15":"República","12-25":"Natal"
      };
      const now = new Date();
      let curYear = now.getFullYear();
      let curMonth = now.getMonth();
      let notes = JSON.parse(localStorage.getItem('notes_lc') || "{}");
      let activeKey = "";

      const daysGrid = document.getElementById('daysGrid');
      const yearVal = document.getElementById('yearVal');
      const yearBadge = document.getElementById('yearBadge');
      const monthLabel = document.getElementById('monthLabel');
      const headerClock = document.getElementById('clock');
      const cubeClock = document.getElementById('cubeClock');
      const cubeMonth = document.getElementById('cubeMonth');
      const cubeYear = document.getElementById('cubeYear');
      const modal = document.getElementById('modal');
      const mTitle = document.getElementById('mTitle');
      const mInput = document.getElementById('mInput');
      const imgIn = document.getElementById('imgIn');
      const headerMain = document.getElementById('headerMain');

      function render() {
        yearVal.textContent = curYear;
        yearBadge.textContent = curYear;
        monthLabel.textContent = months[curMonth];
        cubeYear.textContent = curYear;
        cubeMonth.textContent = months[curMonth];

        const firstDay = new Date(curYear, curMonth, 1).getDay();
        const lastDate = new Date(curYear, curMonth + 1, 0).getDate();
        let html = "";
        for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';
        for (let d = 1; d <= lastDate; d++) {
          const noteKey = `${curYear}-${curMonth}-${d}`;
          const holidayKey = `${curMonth + 1}-${d}`;
          const isToday = (curYear === now.getFullYear() && curMonth === now.getMonth() && d === now.getDate());
          const holidayName = holidays[holidayKey];
          const hasNote = notes[noteKey];
          html += `<div class="day ${isToday ? 'today' : ''} ${holidayName ? 'holiday' : ''}" onclick="window._openModal('${noteKey}', ${d})">${d}${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}${hasNote ? '<div class="note-dot"></div>' : ''}</div>`;
        }
        daysGrid.innerHTML = html;
      }

      window._openModal = (key, day) => {
        activeKey = key;
        mTitle.textContent = `📝 Lembrete: ${day}/${curMonth + 1}/${curYear}`;
        mInput.value = notes[key] || "";
        modal.style.display = "flex";
        mInput.focus();
      };
      window.saveNote = () => {
        const text = mInput.value.trim();
        if (text) notes[activeKey] = text; else delete notes[activeKey];
        localStorage.setItem('notes_lc', JSON.stringify(notes));
        window.closeModal();
        render();
      };
      window.closeModal = () => { modal.style.display = "none"; };

      window.changeMonth = (delta) => {
        curMonth += delta;
        if (curMonth < 0) { curMonth = 11; curYear--; }
        else if (curMonth > 11) { curMonth = 0; curYear++; }
        render();
      };
      window.changeYear = (delta) => { curYear += delta; render(); };

      function updateClock() {
        const timeStr = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        headerClock.textContent = timeStr;
        cubeClock.textContent = timeStr;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // CORRIGIDO: Agora aplica a imagem apenas no cabeçalho (área do relógio)
      imgIn.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const imgData = ev.target.result;
            headerMain.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${imgData})`;
            try {
              localStorage.setItem('bg_calendario_header', imgData);
            } catch (err) {
              console.log("Imagem muito pesada para histórico do LocalStorage.");
            }
          };
          reader.readAsDataURL(file);
        }
      };

      window.resetBg = () => {
        localStorage.removeItem('bg_calendario_header');
        headerMain.style.backgroundImage = "linear-gradient(135deg, rgba(30, 60, 114, 0.85), rgba(42, 82, 152, 0.85))";
      };

      const savedBg = localStorage.getItem('bg_calendario_header');
      if (savedBg) {
        headerMain.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${savedBg})`;
      }

      const cubeWrapper = document.getElementById('cubeWrapper');
      const mainCube = document.getElementById('mainCube');
      let isDragging = false, prevX = 0, prevY = 0, rotX = -8, rotY = 0, autoAnimPaused = false;
      
      cubeWrapper.addEventListener('mousedown', (e) => {
        isDragging = true; prevX = e.clientX; prevY = e.clientY;
        mainCube.style.animationPlayState = 'paused'; autoAnimPaused = true; e.preventDefault();
      });
      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevX, dy = e.clientY - prevY;
        rotY += dx * 0.6; rotX -= dy * 0.6;
        rotX = Math.max(-30, Math.min(30, rotX));
        mainCube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        prevX = e.clientX; prevY = e.clientY;
      });
      window.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          setTimeout(() => {
            if (autoAnimPaused) { mainCube.style.animationPlayState = 'running'; autoAnimPaused = false; mainCube.style.transform = ''; }
          }, 2000);
        }
      });

      cubeWrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
          mainCube.style.animationPlayState = 'paused'; autoAnimPaused = true;
        }
      }, { passive: true });
      window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const dx = e.touches[0].clientX - prevX, dy = e.touches[0].clientY - prevY;
        rotY += dx * 0.6; rotX -= dy * 0.6;
        rotX = Math.max(-30, Math.min(30, rotX));
        mainCube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
      }, { passive: true });
      window.addEventListener('touchend', () => {
        if (isDragging) {
          isDragging = false;
          setTimeout(() => {
            if (autoAnimPaused) { mainCube.style.animationPlayState = 'running'; autoAnimPaused = false; mainCube.style.transform = ''; }
          }, 2000);
        }
      });

      render();
    })();
  </script>
</body>
</html>
