<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVERINO-LC</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- CHAMADA OFICIAL DO GOOGLE ADMOB (WEBVIEW) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-5064995654489535" crossorigin="anonymous"></script>
    
    <!-- CONFIGURAÇÃO DO ANÚNCIO INTERSTICIAL (TELA CHEIA) -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({
            google_ad_client: "ca-app-pub-5064995654489535",
            enable_page_level_ads: true,
            interstitials: { ad_slot: "2382377485" }
        });
    </script>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f2027; /* Fallback sólido para WebViews antigos */
            background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        header {
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            max-width: 100%;
            box-sizing: border-box; /* Garante que o padding não cause overflow horizontal */
        }
        
        .card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
            border-radius: 20px;
            padding: 15px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px; /* Leve ajuste para evitar quebra indesejada em palavras longas no A10s */
            
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 0, 0, 0.3);
            
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4),
                inset 2px 2px 5px rgba(255, 255, 255, 0.05);
        }
        
        .card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-3px);
        }
        
        .video-severino {
            width: 340px;
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.6);
        }
        
        .card video,
        .card img {
            width: 80px;
            height: 80px; /* Definir altura fixa evita falhas de redimensionamento no WebView do Android 11 */
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        }
        
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
            z-index: 999;
        }
        
        .closeBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <header>Amigo SEVERINO - LC</header>
    
    <div style="text-align: center; width: 100%;">
        <img class="video-severino" src="app_severino.jpeg" style="max-width: 100%; height: auto; display: block; margin: 0 auto 20px auto; border-radius: 10px;">
    </div>
    
    <div class="container">
        <div class="card" onclick="window.location.href='biblia.html'">

        </div>

        <div class="card" onclick="window.location.href='velocimetro-4V.html'">

        </div>

        </div>
        
        <div class="card" onclick="window.location.href='rota.html'">
            <img src="rotafacil-final_img.jpeg" alt="rota facil">

        </div>
        
        <div class="card" onclick="window.location.href='conversor_moeda.html'">

        <div class="card" onclick="window.location.href='consultaveiculos.html'">

            <div style="margin-top: 10px;">CONSULTA VEÍCULO-LC</div>
        </div>
        
        <div class="card" onclick="window.location.href='agendaeletronica.html'">

        <div class="card" onclick="window.location.href='cotacaodemetais.html'">

        <div class="card" onclick="window.location.href='calculadora.html'">

        <div class="card" onclick="window.location.href='calendario.html'">

        <div class="card" onclick="window.location.href='bussola.html'">
            <img src="bussola-img.jpeg" alt="bussóla">
            <div style="margin-top: 10px;">BÚSSOLA</div>
        </div>
        
        <div class="card" onclick="window.location.href='calculadora_IMC.html'">
            <img src="calculadoraIMC_img.jpeg" alt="calculadora IMC">
            <div style="margin-top: 10px;">CALCULADORA IMC</div>
        </div>
        
        <div class="card" onclick="window.location.href='checklist.html'">
            <img src="cheklistmanutencao-img.jpeg" alt="checklist manutencao">
            <div style="margin-top: 10px;">CHECKLIST MANUTENÇÃO</div>
        </div>
        
         <div class="card" onclick="window.location.href='saverinooffGrid_1.html'">
            <img src="img_OffgridSeverino_img.jpeg" alt="severino offgrid bitola">
            <div style="margin-top: 10px;">Off-GRID BITOLA FIO</div>
        </div>
        
        <div class="card" onclick="window.location.href='codigoresitor_1.html'">
            <img src="codigo_cores_resistores.jpeg" alt="codigo resistores">
            <div style="margin-top: 10px;">CÓDIGO RESISTORES</div>
        </div>
        
        <div class="card" onclick="window.location.href='codigocoresfio.html'">
            <img src="1-codigofio_img.jpeg" alt="codigo Cores Fio">
            <div style="margin-top: 10px;">CÓDIGO CORES FIO</div>
        </div> 
                     
    </div>
    
    <iframe id="frame"></iframe>
    <button class="closeBtn" onclick="closeFrame()">X</button>
    
    <script>
        function openLocal(file) {
            document.getElementById('frame').src = file;
            document.getElementById('frame').style.display = 'block';
            document.querySelector('.closeBtn').style.display = 'block';
        }
        
        function openLink(url) { window.open(url, '_blank'); }
        
        function closeFrame() {
            document.getElementById('frame').style.display = 'none';
            document.getElementById('frame').src = "";
            document.querySelector('.closeBtn').style.display = 'none';
            
            if (typeof adsbygoogle !== 'undefined') {
                (adsbygoogle = window.adsbygoogle || []).push({});
            }
        }
    </script>
</body>
