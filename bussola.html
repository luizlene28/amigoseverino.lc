<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bússola 3D Premium</title>
    <style>
        :root {
            --bg: #06080f;
            --gold: #d4a960;
            --gold-light: #f0d78c;
            --accent: #3b7ddd;
            --danger: #e05555;
            --text: #e8e8f0;
            --text-secondary: #a0a4b8;
            --glass-bg: rgba(10, 14, 24, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.55);
            --radius-xl: 28px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --transition-smooth: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-display);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        #main-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: block;
        }

        /* === CONTAINER DO CUBO 3D (TOPO ESQUERDO) === */
        #cube-container {
            position: fixed;
            top: 18px;
            left: 18px;
            width: 62px;
            height: 62px;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.5));
            transition: all var(--transition-smooth);
        }
        #cube-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: var(--radius-md);
        }
        #cube-container::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 169, 96, 0.3) 0%, transparent 70%);
            z-index: -1;
            animation: cubeGlowPulse 3s ease-in-out infinite;
        }
        @keyframes cubeGlowPulse {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.25);
            }
        }

        /* === OVERLAY UI === */
        #ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 20px 12px;
        }

        .header-title {
            text-align: center;
            pointer-events: none;
        }
        .header-title .app-name {
            display: inline-block;
            font-size: clamp(16px, 3.5vw, 22px);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(180, 200, 255, 0.5);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 10px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .header-title .app-name .icon-compass {
            display: inline-block;
            animation: gentlePulse 2.5s ease-in-out infinite;
            font-size: 1.3em;
            vertical-align: -3px;
            margin-right: 2px;
        }
        @keyframes gentlePulse {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 6px rgba(255, 200, 100, 0.6));
            }
            50% {
                transform: scale(1.18);
                filter: drop-shadow(0 0 16px rgba(255, 180, 60, 0.9));
            }
        }

        /* Indicador de heading */
        #heading-display {
            text-align: center;
            pointer-events: none;
            margin-top: auto;
            margin-bottom: 85px;
        }
        #heading-display .heading-card {
            display: inline-block;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 14px 28px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: var(--shadow-lg);
        }
        #heading-display .direction-label {
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        #heading-display .degrees-label {
            font-size: clamp(13px, 2.5vw, 17px);
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-top: 2px;
        }
        #heading-display .highlight-north {
            color: #ff5555;
            text-shadow: 0 0 18px rgba(255, 80, 80, 0.7);
        }

        /* Botão de sensores */
        #sensor-btn-wrapper {
            text-align: center;
            pointer-events: auto;
            position: fixed;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
        }
        #permission-btn {
            background: linear-gradient(135deg, #1a1e2e 0%, #252b3d 100%);
            color: #d4d8e8;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: 13px 30px;
            border-radius: 40px;
            font-size: clamp(13px, 2.8vw, 16px);
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all var(--transition-smooth);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            white-space: nowrap;
            font-family: var(--font-display);
            outline: none;
        }
        #permission-btn:active {
            transform: scale(0.94);
            background: linear-gradient(135deg, #2a3048 0%, #353e55 100%);
            border-color: var(--gold);
            box-shadow: 0 4px 16px rgba(212, 169, 96, 0.5);
        }
        #permission-btn.active-state {
            background: linear-gradient(135deg, #1a3a1a 0%, #1f4428 100%);
            border-color: #4caf84;
            color: #c8f0d8;
            pointer-events: none;
            animation: activeGlow 2s ease-in-out infinite;
        }
        @keyframes activeGlow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(76, 175, 132, 0.7);
            }
        }
        #permission-btn.disabled-state {
            background: #1a1a1a;
            border-color: #444;
            color: #777;
            pointer-events: none;
            cursor: not-allowed;
        }

        /* === AVISO DE PRECISÃO (RODAPÉ) === */
        #precision-warning {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            text-align: center;
            width: 90vw;
        }
        #precision-warning span {
            font-size: clamp(9px, 1.6vw, 11px);
            color: rgba(180, 185, 200, 0.55);
            letter-spacing: 0.03em;
            font-weight: 400;
            line-height: 1.35;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }

        /* === AJUSTES DE RESPONSIVIDADE E DISPOSITIVOS === */
        @media (max-width: 600px) {
            #cube-container {
                top: 14px;
                left: 14px;
                width: 48px;
                height: 48px;
            }
            #ui-overlay {
                padding: 12px 12px 8px;
            }
            #heading-display {
                margin-bottom: 90px;
            }
            #sensor-btn-wrapper {
                bottom: 40px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            #heading-display {
                margin-bottom: 10px;
                position: fixed;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
            }
            #sensor-btn-wrapper {
                bottom: 15px;
                left: 20px;
                transform: none;
            }
            #cube-container {
                display: none;
            }
            #precision-warning {
                display: none;
            }
        }
    </style>
</head>
<body>

    <canvas id="main-canvas"></canvas>

    <div id="cube-container">
        <canvas id="cube-canvas"></canvas>
    </div>

    <div id="ui-overlay">
        <div class="header-title">
            <span class="app-name">
                <span class="icon-compass">🧭</span> BÚSSOLA 3D
            </span>
        </div>
        <div id="heading-display">
            <div class="heading-card">
                <div class="direction-label" id="direction-text">N • <span class="highlight-north">NORTE</span></div>
                <div class="degrees-label" id="degrees-text">0°</div>
            </div>
        </div>
    </div>

    <div id="sensor-btn-wrapper">
        <button id="permission-btn" aria-label="Ativar sensores de orientação">📡 ATIVAR SENSORES</button>
    </div>

    <div id="precision-warning">
        <span>⚠️ A bússola digital possui precisão filtrada e estabilizada. Use como referência.</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        (function() {
            if (typeof THREE === 'undefined') {
                document.body.innerHTML =
                    '<div style="color:#fff;text-align:center;padding:40px;"><h2>Erro ao carregar Three.js</h2></div>';
                return;
            }

            const mainCanvas = document.getElementById('main-canvas');
            const cubeCanvas = document.getElementById('cube-canvas');
            const directionText = document.getElementById('direction-text');
            const degreesText = document.getElementById('degrees-text');
            const permissionBtn = document.getElementById('permission-btn');
            const cubeContainer = document.getElementById('cube-container');

            // ============ RENDERER PRINCIPAL ============
            const renderer = new THREE.WebGLRenderer({ canvas: mainCanvas, antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.15;
            renderer.outputEncoding = THREE.sRGBEncoding;

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x06080f, 0.00012);

            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 80);
            camera.position.set(0, 7.0, 11.5);
            camera.lookAt(0, 0.2, 0);

            // ============ ILUMINAÇÃO MELHORADA ============
            const ambientLight = new THREE.AmbientLight(0x445577, 1.0);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xfffaf0, 1.4);
            keyLight.position.set(8, 14, 6);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.bias = -0.0001;
            keyLight.shadow.normalBias = 0.02;
            scene.add(keyLight);

            const fillLight = new THREE.PointLight(0x6688cc, 0.8, 25);
            fillLight.position.set(-6, 2, -4);
            scene.add(fillLight);

            const rimLight = new THREE.PointLight(0xff9966, 0.6, 20);
            rimLight.position.set(0, -1.5, 7);
            scene.add(rimLight);

            const accentLight = new THREE.PointLight(0xffcc88, 0.5, 15);
            accentLight.position.set(0, 3.5, -5);
            scene.add(accentLight);

            // ============ PLANETA TERRA NO FUNDO (MELHORADO) ============
            const earthGroup = new THREE.Group();
            scene.add(earthGroup);

            function createEarthTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const oceanGrad = ctx.createRadialGradient(512, 200, 50, 512, 256, 600);
                oceanGrad.addColorStop(0, '#2a80d4');
                oceanGrad.addColorStop(0.5, '#1a5ea8');
                oceanGrad.addColorStop(1, '#0d3d78');
                ctx.fillStyle = oceanGrad;
                ctx.fillRect(0, 0, 1024, 512);

                ctx.fillStyle = '#5aae4f';
                ctx.strokeStyle = '#408a35';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 6;

                function drawContinent(cx, cy, rx, ry, rotation = 0) {
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(rotation);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }
                drawContinent(180, 130, 85, 115, 0.1);
                drawContinent(230, 290, 50, 85, 0.05);
                drawContinent(510, 140, 65, 72, 0);
                drawContinent(520, 275, 58, 105, -0.05);
                drawContinent(720, 155, 105, 95, 0.08);
                drawContinent(790, 340, 32, 26, 0.15);
                ctx.shadowBlur = 0;
                return new THREE.CanvasTexture(canvas);
            }

            const earthGeo = new THREE.SphereGeometry(3, 48, 48);
            const earthMat = new THREE.MeshStandardMaterial({
                map: createEarthTexture(),
                roughness: 0.55,
                metalness: 0.08
            });
            const earth = new THREE.Mesh(earthGeo, earthMat);
            earth.position.y = -8.5;
            earthGroup.add(earth);

            // ============ BÚSSOLA PRINCIPAL ============
            const compassGroup = new THREE.Group();
            scene.add(compassGroup);

            const baseGeo = new THREE.CylinderGeometry(4.2, 4.7, 0.55, 64);
            const baseMat = new THREE.MeshStandardMaterial({
                color: 0x1a1e2c,
                metalness: 0.9,
                roughness: 0.18
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.receiveShadow = true;
            base.castShadow = true;
            compassGroup.add(base);

            const ringGeo = new THREE.TorusGeometry(4.55, 0.14, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0xf0d060,
                metalness: 0.95,
                roughness: 0.12,
                emissive: 0x221100,
                emissiveIntensity: 0.3
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.3;
            compassGroup.add(ring);

            // Marcadores da rosa dos ventos
            for (let i = 0; i < 72; i++) {
                const angle = (i / 72) * Math.PI * 2;
                let length = (i % 18 === 0) ? 0.75 : ((i % 9 === 0) ? 0.5 : 0.28);
                let color = (i % 18 === 0) ? 0xf0d060 : ((i % 9 === 0) ? 0xdddddd : 0x777788);

                const markerGeo = new THREE.BoxGeometry(0.07, 0.018, length);
                const markerMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
                const marker = new THREE.Mesh(markerGeo, markerMat);
                marker.position.set(Math.cos(angle) * 4.45, 0.32, Math.sin(angle) * 4.45);
                marker.rotation.y = -angle;
                compassGroup.add(marker);
            }

            // ============ LABELS DE DIREÇÃO (VISIBILIDADE MELHORADA) ============
            function createLabel(text, color, x, z, isMain = false) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                // Sombra/contorno para destacar
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 28;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 4;

                // Cor de preenchimento vibrante
                ctx.fillStyle = color;
                ctx.font = isMain ? 'bold 200px "Segoe UI", "Arial Black", sans-serif' :
                    'bold 160px "Segoe UI", "Arial Black", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, 256, 256);

                // Contorno adicional para máximo destaque
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.strokeStyle = 'rgba(0,0,0,0.7)';
                ctx.lineWidth = 12;
                ctx.strokeText(text, 256, 256);

                // Reaplicar preenchimento por cima do contorno
                ctx.fillStyle = color;
                ctx.fillText(text, 256, 256);

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    depthTest: false,
                    depthWrite: false,
                    transparent: true
                });
                const sprite = new THREE.Sprite(material);
                // Posicionamento elevado (Y maior) e mais próximo do centro para visibilidade
                sprite.position.set(x, 2.1, z);
                // Escala aumentada significativamente
                sprite.scale.set(3.2, 3.2, 1);
                compassGroup.add(sprite);
            }

            // Posições em raio 5.0 (ligeiramente para fora da borda da bússola)
            createLabel('N', '#ff4444', 0, -5.0, true);
            createLabel('S', '#44ccff', 0, 5.0, false);
            createLabel('L', '#44ee66', 5.0, 0, false);
            createLabel('O', '#ffaa33', -5.0, 0, false);

            // Ponteiro / Agulha
            const pointerGroup = new THREE.Group();
            pointerGroup.position.y = 0.35;
            compassGroup.add(pointerGroup);

            const redNeedleMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.08, 3.3),
                new THREE.MeshStandardMaterial({ color: 0xee2222, metalness: 0.3, emissive: 0x330000,
                    roughness: 0.25 })
            );
            redNeedleMesh.position.z = -1.65;
            redNeedleMesh.castShadow = true;
            pointerGroup.add(redNeedleMesh);

            const grayNeedleMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.08, 2.7),
                new THREE.MeshStandardMaterial({ color: 0x666677, roughness: 0.35 })
            );
            grayNeedleMesh.position.z = 1.35;
            pointerGroup.add(grayNeedleMesh);

            const centerSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xf5d870, metalness: 0.9, roughness: 0.1,
                    emissive: 0x221100, emissiveIntensity: 0.4 })
            );
            pointerGroup.add(centerSphere);

            // Vidro protetor (mais refinado)
            const glass = new THREE.Mesh(
                new THREE.SphereGeometry(2.4, 48, 48),
                new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.18,
                    roughness: 0.08,
                    clearcoat: 1.0,
                    clearcoatRoughness: 0.05
                })
            );
            glass.position.y = 0.6;
            compassGroup.add(glass);

            // Estrelas de fundo (mais densas e brilhantes)
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 600;
            const starsPositions = new Float32Array(starsCount * 3);
            for (let i = 0; i < starsCount * 3; i++) {
                starsPositions[i] = (Math.random() - 0.5) * 45;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({
                size: 0.05,
                color: 0xffffff,
                transparent: true,
                opacity: 0.7
            }));
            scene.add(stars);

            // ============ MINI CUBO AUXILIAR (TOPO) ============
            const cubeScene = new THREE.Scene();
            const cubeCamera = new THREE.PerspectiveCamera(40, 1, 0.1, 10);
            cubeCamera.position.set(1.6, 1.2, 2.2);
            cubeCamera.lookAt(0, 0, 0);

            const cubeRenderer = new THREE.WebGLRenderer({ canvas: cubeCanvas, antialias: true, alpha: true });
            cubeRenderer.setSize(62, 62);

            const cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.85, 0.85, 0.85),
                new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    metalness: 0.3,
                    roughness: 0.2,
                    transparent: true,
                    opacity: 0.7
                })
            );
            const edgesGeo = new THREE.EdgesGeometry(cubeMesh.geometry);
            const edgesLine = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0xf5d870,
                linewidth: 1 }));
            cubeMesh.add(edgesLine);
            cubeScene.add(cubeMesh);
            cubeScene.add(new THREE.AmbientLight(0xffffff, 1.6));

            // ============ LÓGICA DE FILTRAGEM E PRECISÃO ============
            let currentHeading = 0;
            let targetHeading = 0;
            let isSensorActive = false;

            let lastHeading = 0;
            const SMOOTH_FACTOR = 0.07;

            function updateHeadingDisplay(heading) {
                const directions = ['N', 'NE', 'L', 'SE', 'S', 'SO', 'O', 'NO'];
                const index = Math.round(heading / 45) % 8;
                const dir = directions[index];

                if (dir === 'N') directionText.innerHTML = 'N • <span class="highlight-north">NORTE</span>';
                else if (dir === 'S') directionText.innerHTML =
                    'S • <span style="color:#33ccff;text-shadow:0 0 14px rgba(50,200,255,0.6);">SUL</span>';
                else if (dir === 'L') directionText.innerHTML =
                    'L • <span style="color:#33dd55;text-shadow:0 0 14px rgba(50,220,80,0.6);">LESTE</span>';
                else if (dir === 'O') directionText.innerHTML =
                    'O • <span style="color:#ffbb33;text-shadow:0 0 14px rgba(255,180,50,0.6);">OESTE</span>';
                else directionText.innerHTML =
                    `${dir} • <span style="color:#ddd;text-shadow:0 0 10px rgba(200,200,200,0.4);">${['NORDESTE','NOROESTE','SUDESTE','SUDOESTE'][['NE','NO','SE','SO'].indexOf(dir)]}</span>`;

                degreesText.textContent = `${Math.round(heading)}°`;
            }

            function handleOrientation(event) {
                if (!isSensorActive) return;

                let rawHeading = 0;
                if (event.webkitCompassHeading !== undefined) {
                    rawHeading = event.webkitCompassHeading;
                } else if (event.alpha !== null) {
                    rawHeading = 360 - event.alpha;
                } else {
                    return;
                }

                rawHeading = (rawHeading + 360) % 360;

                let diff = rawHeading - lastHeading;
                if (diff > 180) rawHeading -= 360;
                if (diff < -180) rawHeading += 360;

                targetHeading = lastHeading + SMOOTH_FACTOR * (rawHeading - lastHeading);
                targetHeading = (targetHeading + 360) % 360;
                lastHeading = targetHeading;
            }

            async function requestSensorPermission() {
                try {
                    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent
                        .requestPermission === 'function') {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') startSensors();
                        else showSensorFallback();
                    } else {
                        startSensors();
                    }
                } catch (e) {
                    showSensorFallback();
                }
            }

            function startSensors() {
                isSensorActive = true;
                permissionBtn.textContent = '✅ SENSORES ATIVOS';
                permissionBtn.classList.add('active-state');
                window.addEventListener('deviceorientation', handleOrientation, true);
                setTimeout(() => {
                    permissionBtn.style.opacity = '0';
                    setTimeout(() => { permissionBtn.style.display = 'none'; }, 400);
                }, 2000);
            }

            function showSensorFallback() {
                isSensorActive = false;
                permissionBtn.textContent = '📱 MODO VISUALIZAÇÃO';
                permissionBtn.classList.add('disabled-state');
            }

            // ============ RESPONSIVIDADE ADAPTATIVA ============
            function handleResize() {
                const w = window.innerWidth;
                const h = window.innerHeight;

                renderer.setSize(w, h);
                camera.aspect = w / h;

                if (w < h) {
                    camera.fov = 55 + (h / w) * 8;
                    camera.position.set(0, 8.5, 12.5);
                } else {
                    camera.fov = 45;
                    camera.position.set(0, 7.0, 11.0);
                }

                camera.lookAt(0, 0.2, 0);
                camera.updateProjectionMatrix();

                const cubeSize = w < 600 ? 48 : 62;
                cubeContainer.style.width = cubeSize + 'px';
                cubeContainer.style.height = cubeSize + 'px';
                cubeRenderer.setSize(cubeSize, cubeSize);
            }

            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => { setTimeout(handleResize, 200); });

            // ============ LOOP DE ANIMAÇÃO ============
            let demoAngle = 0;

            function animate(timestamp) {
                requestAnimationFrame(animate);

                earth.rotation.y += 0.001;
                stars.rotation.y += 0.0001;

                if (isSensorActive) {
                    let delta = targetHeading - currentHeading;
                    if (delta > 180) delta -= 360;
                    if (delta < -180) delta += 360;
                    currentHeading += delta * 0.15;
                    currentHeading = (currentHeading + 360) % 360;

                    pointerGroup.rotation.y = THREE.MathUtils.degToRad(currentHeading);
                    updateHeadingDisplay(currentHeading);
                } else {
                    demoAngle = (demoAngle + 0.2) % 360;
                    pointerGroup.rotation.y = THREE.MathUtils.degToRad(demoAngle);
                    updateHeadingDisplay(demoAngle);
                }

                renderer.render(scene, camera);

                // Animação do mini cubo
                cubeMesh.rotation.x += 0.01;
                cubeMesh.rotation.y += 0.015;
                cubeRenderer.render(cubeScene, cubeCamera);
            }

            // Inicialização
            permissionBtn.addEventListener('click', requestSensorPermission);
            permissionBtn.addEventListener('touchend', requestSensorPermission);

            handleResize();
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
